<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Eventual — Market Display</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #000;
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
  }

  #embed-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  #no-market {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    color: #FFF30A;
    background: #000;
  }

  #no-market .wordmark {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #FFF30A;
    margin-bottom: 16px;
  }

  #no-market .hint {
    font-size: 16px;
    color: #555;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div id="no-market">
  <div class="wordmark">EVENTUAL</div>
  <div class="hint">No market selected — use the control panel</div>
</div>

<script>
  const STORAGE_KEY = 'eventual_active_market';

  function buildEmbedUrl(marketInput) {
    // Accept either a short ID (james-comey-arrested-by-april-28-647-577)
    // or a full polymarket.com URL — extract the ID either way
    let marketId = marketInput.trim();

    // If it's a full URL, strip everything and just keep the last path segment
    if (marketId.includes('polymarket.com')) {
      // Remove hash fragment first
      marketId = marketId.split('#')[0];
      // Take the last non-empty path segment
      const parts = marketId.split('/').filter(Boolean);
      marketId = parts[parts.length - 1];
    }

    return `https://embed.polymarket.com/market?market=${encodeURIComponent(marketId)}&height=1080&theme=dark`;
  }

  function loadMarket(marketUrl) {
    const noMarket = document.getElementById('no-market');
    let frame = document.getElementById('embed-frame');

    if (!marketUrl) {
      if (frame) frame.remove();
      noMarket.style.display = 'flex';
      return;
    }

    noMarket.style.display = 'none';

    if (!frame) {
      frame = document.createElement('iframe');
      frame.id = 'embed-frame';
      frame.allowTransparency = true;
      document.body.appendChild(frame);
    }

    frame.src = buildEmbedUrl(marketUrl);
  }

  // Read from localStorage (set by control panel)
  function poll() {
    const stored = localStorage.getItem(STORAGE_KEY);
    loadMarket(stored || '');
  }

  // Also support URL hash for direct linking: chart-display.html#https://polymarket.com/...
  const hash = decodeURIComponent(location.hash.slice(1));
  if (hash.startsWith('http')) {
    loadMarket(hash);
  } else {
    poll();
    setInterval(poll, 1000); // poll every second for control panel updates
  }

  // Listen for storage events (cross-tab)
  window.addEventListener('storage', (e) => {
    if (e.key === STORAGE_KEY) loadMarket(e.newValue || '');
  });
</script>
</body>
</html>
