<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Eventual — Market Display</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #000;
    font-family: 'Helvetica Neue', Helvetica, sans-serif;
  }

  #embed-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(4.5);
    transform-origin: center center;
    width: 800px;
    height: 500px;
  }

  #embed-frame {
    width: 800px;
    height: 500px;
    border: none;
    display: block;
  }

  #no-market {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    color: #FFF30A;
    background: #000;
  }

  #no-market .wordmark {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #FFF30A;
    margin-bottom: 16px;
  }

  #no-market .hint {
    font-size: 16px;
    color: #555;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div id="no-market">
  <div class="wordmark">EVENTUAL</div>
  <div class="hint">No market selected — use the control panel</div>
</div>

<script>
  const WORKER_URL = 'https://polymarketcharts.alex-f49.workers.dev';

  function buildEmbedUrl(marketId) {
    let id = marketId.trim();
    if (id.includes('polymarket.com')) {
      id = id.split('#')[0];
      const parts = id.split('/').filter(Boolean);
      id = parts[parts.length - 1];
    }
    return `https://embed.polymarket.com/market?market=${encodeURIComponent(id)}&width=800&height=500&theme=dark`;
  }

  let currentMarket = null;

  function loadMarket(marketId) {
    const noMarket = document.getElementById('no-market');
    let wrapper = document.getElementById('embed-wrapper');

    if (marketId === currentMarket) return;
    currentMarket = marketId;

    if (!marketId) {
      if (wrapper) wrapper.remove();
      noMarket.style.display = 'flex';
      return;
    }

    noMarket.style.display = 'none';

    if (!wrapper) {
      wrapper = document.createElement('div');
      wrapper.id = 'embed-wrapper';
      const frame = document.createElement('iframe');
      frame.id = 'embed-frame';
      frame.allowTransparency = true;
      wrapper.appendChild(frame);
      document.body.appendChild(wrapper);
    }

    document.getElementById('embed-frame').src = buildEmbedUrl(marketId);
  }

  async function poll() {
    try {
      const res = await fetch(`${WORKER_URL}/active-market`);
      const data = await res.json();
      loadMarket(data.market || '');
    } catch (e) {}
  }

  poll();
  setInterval(poll, 2000);
</script>
</body>
</html>
